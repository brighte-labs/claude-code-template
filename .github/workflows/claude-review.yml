name: Claude Code Review

# Researcher first decides which agents to run, then runs them in parallel via matrix.
# Uses AWS Bedrock (ap-southeast-2) via GitHub OIDC — no Anthropic API key required.
# Assumes: arn:aws:iam::040925256309:role/github-bedrock

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Detect risk tier from changed files
  # ─────────────────────────────────────────────
  detect-tier:
    name: Detect risk tier
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    outputs:
      tier: ${{ steps.tier.outputs.tier }}
      changed_files: ${{ steps.tier.outputs.changed_files }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Determine tier from diff
        id: tier
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | tr '\n' ' ')
          echo "changed_files=$CHANGED" >> "$GITHUB_OUTPUT"

          # Tier 3 — IaC, IAM, payments, PII
          if git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -qE "^terraform/|\.tf$|iam|auth|payment|finpower|pii"; then
            echo "tier=3" >> "$GITHUB_OUTPUT"
            echo "Tier 3 detected (Terraform/IaC/sensitive files)"

          # Tier 2 — application code
          elif git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -qvE "\.(md|txt|test\.|spec\.|css|png|jpg|svg)$|^docs/|^README"; then
            echo "tier=2" >> "$GITHUB_OUTPUT"
            echo "Tier 2 detected (application code)"

          else
            echo "tier=1" >> "$GITHUB_OUTPUT"
            echo "Tier 1 detected (docs/tests/assets only)"
          fi

  # ─────────────────────────────────────────────
  # Job 2: Researcher — decide which agents to run
  # ─────────────────────────────────────────────
  research:
    name: Research — select agents
    needs: detect-tier
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
      id-token: write

    outputs:
      agents: ${{ steps.parse.outputs.agents }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: '22'

      - name: Configure AWS credentials (OIDC → mgmt bedrock role)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::040925256309:role/github-bedrock
          aws-region: ap-southeast-2

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Fetch agents from claude-code-template
        run: |
          git clone --depth 1 https://github.com/brighte-labs/claude-code-template.git /tmp/claude-template
          mkdir -p .claude
          cp -r /tmp/claude-template/.claude/agents .claude/

      - name: Run researcher agent
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
          AWS_REGION: ap-southeast-2
          ANTHROPIC_MODEL: arn:aws:bedrock:ap-southeast-2:040925256309:application-inference-profile/ge31a9iidhwa
          ANTHROPIC_SMALL_FAST_MODEL: arn:aws:bedrock:ap-southeast-2:040925256309:application-inference-profile/ys8eznxdwug5
          ANTHROPIC_DEFAULT_SONNET_MODEL: arn:aws:bedrock:ap-southeast-2:040925256309:application-inference-profile/ge31a9iidhwa
          ANTHROPIC_DEFAULT_HAIKU_MODEL: arn:aws:bedrock:ap-southeast-2:040925256309:application-inference-profile/ys8eznxdwug5
          ANTHROPIC_DEFAULT_OPUS_MODEL: arn:aws:bedrock:ap-southeast-2:040925256309:application-inference-profile/8jk1lhs5f6h7
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TIER: ${{ needs.detect-tier.outputs.tier }}
          CHANGED_FILES: ${{ needs.detect-tier.outputs.changed_files }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE_BRANCH: ${{ github.base_ref }}
        run: |
          set -o pipefail
          claude --dangerously-skip-permissions -p "
          You are the researcher agent for an automated PR review system.

          Context:
          - Repo: ${REPO}
          - PR: #${PR_NUMBER}
          - Base branch: ${BASE_BRANCH}
          - Risk Tier: ${TIER} (auto-detected from changed files)
          - Changed files: ${CHANGED_FILES}

          Instructions:
          1. Fetch the PR diff: run \`gh pr diff ${PR_NUMBER}\`
          2. Follow the instructions in .claude/agents/researcher.md
          3. Based on your research, select the relevant agents from this list:
             - code-duplication  (repeated/duplicated code patterns)
             - code-reviewer     (general code quality, logic, best practices)
             - code-security     (deep security vulnerabilities)
             - compliance-checker (APRA/SOC 2 compliance implications)
             - dependency-audit  (dependency vulnerabilities, outdated packages)
             - infra-reviewer    (infrastructure, Terraform, IaC changes)
             - security-reviewer (security review — auth, secrets, injection)
          4. On the very last line of your response, output ONLY this line (no other text after it):
             AGENTS_JSON: [\"agent1\",\"agent2\"]
          " 2>&1 | tee research-output.txt

      - name: Parse selected agents
        id: parse
        run: |
          AGENTS=$(grep '^AGENTS_JSON: ' research-output.txt | tail -1 | sed 's/^AGENTS_JSON: //')
          if [ -z "$AGENTS" ] || [ "$AGENTS" = "[]" ]; then
            echo "⚠️ Researcher returned no agents — falling back to defaults"
            AGENTS='["code-duplication","code-reviewer","code-security","compliance-checker","dependency-audit","infra-reviewer","security-reviewer"]'
          fi
          echo "Selected agents: $AGENTS"
          echo "agents=$AGENTS" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────
  # Job 3: Run each selected agent in parallel
  # ─────────────────────────────────────────────
  agent-review:
    name: Agent — ${{ matrix.agent }}
    needs: [detect-tier, research]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
      id-token: write

    strategy:
      matrix:
        agent: ${{ fromJSON(needs.research.outputs.agents) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: '22'

      - name: Configure AWS credentials (OIDC → mgmt bedrock role)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::040925256309:role/github-bedrock
          aws-region: ap-southeast-2

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Fetch agents from claude-code-template
        run: |
          git clone --depth 1 https://github.com/brighte-labs/claude-code-template.git /tmp/claude-template
          mkdir -p .claude
          cp -r /tmp/claude-template/.claude/agents .claude/

      - name: Run ${{ matrix.agent }} agent
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
          AWS_REGION: ap-southeast-2
          ANTHROPIC_MODEL: arn:aws:bedrock:ap-southeast-2:040925256309:application-inference-profile/ge31a9iidhwa
          ANTHROPIC_SMALL_FAST_MODEL: arn:aws:bedrock:ap-southeast-2:040925256309:application-inference-profile/ys8eznxdwug5
          ANTHROPIC_DEFAULT_SONNET_MODEL: arn:aws:bedrock:ap-southeast-2:040925256309:application-inference-profile/ge31a9iidhwa
          ANTHROPIC_DEFAULT_HAIKU_MODEL: arn:aws:bedrock:ap-southeast-2:040925256309:application-inference-profile/ys8eznxdwug5
          ANTHROPIC_DEFAULT_OPUS_MODEL: arn:aws:bedrock:ap-southeast-2:040925256309:application-inference-profile/8jk1lhs5f6h7
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TIER: ${{ needs.detect-tier.outputs.tier }}
          CHANGED_FILES: ${{ needs.detect-tier.outputs.changed_files }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          BASE_BRANCH: ${{ github.base_ref }}
          AGENT: ${{ matrix.agent }}
        run: |
          set -o pipefail
          claude --dangerously-skip-permissions -p "
          You are running the ${AGENT} agent for an automated PR review.

          Context:
          - Repo: ${REPO}
          - PR: #${PR_NUMBER}
          - Base branch: ${BASE_BRANCH}
          - Risk Tier: ${TIER}
          - Changed files: ${CHANGED_FILES}

          Instructions:
          1. Fetch the PR diff: run \`gh pr diff ${PR_NUMBER}\`
          2. Read the changed files listed above
          3. Run the .claude/agents/${AGENT}.md agent — follow its instructions precisely
          4. Output findings in markdown with severity labels (CRITICAL / HIGH / MEDIUM / LOW)
             Each finding: severity, file:line, description, suggested fix
          " 2>&1 | tee agent-output.md

      - name: Upload agent findings
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.agent }}
          path: agent-output.md

  # ─────────────────────────────────────────────
  # Job 4: Consolidate findings → PR comment + gate
  # ─────────────────────────────────────────────
  consolidate:
    name: Consolidate and quality gate
    needs: agent-review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: '22'

      - name: Configure AWS credentials (OIDC → mgmt bedrock role)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::040925256309:role/github-bedrock
          aws-region: ap-southeast-2

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Download all agent findings
        uses: actions/download-artifact@v4
        with:
          pattern: agent-*
          path: agent-outputs/
          merge-multiple: false

      - name: Combine findings into one file
        run: |
          echo "# Agent Findings" > combined-findings.md
          for dir in agent-outputs/agent-*/; do
            agent_name=$(basename "$dir" | sed 's/^agent-//')
            echo "" >> combined-findings.md
            echo "---" >> combined-findings.md
            echo "## Agent: $agent_name" >> combined-findings.md
            cat "$dir/agent-output.md" >> combined-findings.md
          done

      - name: Consolidate into final report
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
          AWS_REGION: ap-southeast-2
          ANTHROPIC_MODEL: arn:aws:bedrock:ap-southeast-2:040925256309:application-inference-profile/ge31a9iidhwa
          ANTHROPIC_SMALL_FAST_MODEL: arn:aws:bedrock:ap-southeast-2:040925256309:application-inference-profile/ys8eznxdwug5
          ANTHROPIC_DEFAULT_SONNET_MODEL: arn:aws:bedrock:ap-southeast-2:040925256309:application-inference-profile/ge31a9iidhwa
          ANTHROPIC_DEFAULT_HAIKU_MODEL: arn:aws:bedrock:ap-southeast-2:040925256309:application-inference-profile/ys8eznxdwug5
          ANTHROPIC_DEFAULT_OPUS_MODEL: arn:aws:bedrock:ap-southeast-2:040925256309:application-inference-profile/8jk1lhs5f6h7
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -o pipefail
          claude --dangerously-skip-permissions -p "
          You are consolidating findings from multiple PR review agents into a single report.

          Read the file combined-findings.md — it contains outputs from all agents that ran.

          Produce a single consolidated markdown report in EXACTLY this format:

          ## Claude Code Review — PR #${PR_NUMBER}

          **Risk Tier:** [1/2/3] | **Verdict:** [PASS / CONDITIONAL PASS / FAIL] | **Score:** [X]/100

          ### Agents run
          [Bullet list of agents that contributed findings]

          ### Findings
          [CRITICAL / HIGH findings first, then MEDIUM, then LOW]
          Each finding: severity, agent, file:line, description, suggested fix

          ### Auto-remediation suggestions
          [Specific code fixes Claude recommends]

          ### Summary
          [2-3 sentence summary of overall quality]

          <!-- claude-code-review -->
          " 2>&1 | tee claude-review-output.md

      - name: Post or update PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(cat claude-review-output.md)
          EXISTING=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | contains("<!-- claude-code-review -->")) | .id' | head -1)
          if [ -n "$EXISTING" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/$EXISTING" \
              -X PATCH -f body="$BODY"
          else
            gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
              -X POST -f body="$BODY"
          fi

      - name: Enforce quality gate
        run: |
          VERDICT=$(grep -oP '\*\*Verdict:\*\* \K[A-Z ]+' claude-review-output.md | head -1 | xargs)
          SCORE=$(grep -oP '\*\*Score:\*\* \K[0-9]+' claude-review-output.md | head -1)
          echo "Verdict: $VERDICT | Score: $SCORE/100"
          if [ "$VERDICT" = "FAIL" ]; then
            echo "❌ Claude review verdict: FAIL — merge blocked."
            exit 1
          fi
          if [ -n "$SCORE" ] && [ "$SCORE" -lt 70 ]; then
            echo "❌ Score $SCORE/100 is below threshold (70) — merge blocked."
            exit 1
          fi
          echo "✅ Quality gate passed (Verdict: $VERDICT, Score: $SCORE/100)"
