name: Claude Code Review

# Runs on every PR — lightweight agents on all PRs, full Tier 3 gate when Terraform files change.
# Uses AWS Bedrock (ap-southeast-2) via GitHub OIDC — no Anthropic API key required.
# Assumes: arn:aws:iam::040925256309:role/github-bedrock

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ─────────────────────────────────────────────
  # Step 1: Detect risk tier from changed files
  # ─────────────────────────────────────────────
  detect-tier:
    name: Detect risk tier
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    outputs:
      tier: ${{ steps.tier.outputs.tier }}
      changed_files: ${{ steps.tier.outputs.changed_files }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Determine tier from diff
        id: tier
        run: |
          git fetch origin ${{ github.base_ref }}
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | tr '\n' ' ')
          echo "changed_files=$CHANGED" >> "$GITHUB_OUTPUT"

          # Tier 3 — IaC, IAM, payments, PII
          if git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -qE "^terraform/|\.tf$|iam|auth|payment|finpower|pii"; then
            echo "tier=3" >> "$GITHUB_OUTPUT"
            echo "Tier 3 detected (Terraform/IaC/sensitive files)"

          # Tier 1 — docs, tests, static assets only
          elif git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -qvE "\.(md|txt|test\.|spec\.|css|png|jpg|svg)$|^docs/|^README"; then
            echo "tier=2" >> "$GITHUB_OUTPUT"
            echo "Tier 2 detected (application code)"

          else
            echo "tier=1" >> "$GITHUB_OUTPUT"
            echo "Tier 1 detected (docs/tests/assets only)"
          fi

  # ─────────────────────────────────────────────
  # Step 2: Run Claude agents against the PR
  # ─────────────────────────────────────────────
  claude-review:
    name: Claude review (Tier ${{ needs.detect-tier.outputs.tier }})
    needs: detect-tier
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: write
      id-token: write   # Required for GitHub OIDC → AWS

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: '22'

      - name: Configure AWS credentials (OIDC → mgmt bedrock role)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: arn:aws:iam::040925256309:role/github-bedrock
          aws-region: ap-southeast-2

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude review
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
          AWS_REGION: ap-southeast-2
          # Claude Code model aliases → AU Bedrock inference profile IDs (ap-southeast-2)
          ANTHROPIC_MODEL: au.anthropic.claude-sonnet-4-6
          ANTHROPIC_SMALL_FAST_MODEL: au.anthropic.claude-haiku-4-5-20251001-v1:0
          ANTHROPIC_DEFAULT_SONNET_MODEL: au.anthropic.claude-sonnet-4-6
          ANTHROPIC_DEFAULT_HAIKU_MODEL: au.anthropic.claude-haiku-4-5-20251001-v1:0
          ANTHROPIC_DEFAULT_OPUS_MODEL: au.anthropic.claude-opus-4-6-v1
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TIER: ${{ needs.detect-tier.outputs.tier }}
          CHANGED_FILES: ${{ needs.detect-tier.outputs.changed_files }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_BRANCH: ${{ github.base_ref }}
        run: |
          claude --dangerously-skip-permissions -p "
          You are running as an automated PR reviewer in GitHub Actions CI.

          Context:
          - Repo: ${REPO}
          - PR: #${PR_NUMBER} — ${PR_TITLE}
          - Base branch: ${BASE_BRANCH}
          - Risk Tier: ${TIER} (auto-detected from changed files)
          - Changed files: ${CHANGED_FILES}

          Instructions:
          1. Fetch the PR diff: run \`gh pr diff ${PR_NUMBER}\`
          2. Read the changed files listed above
          3. Run the following agents based on tier:
             - ALL tiers:  code-reviewer, security-reviewer
             - Tier 2 + 3: infra-reviewer (only if IaC files changed)
             - Tier 3 only: code-security, compliance-checker
          4. Return a single consolidated markdown report using this format:

          ## Claude Code Review — PR #${PR_NUMBER}

          **Risk Tier:** [1/2/3] | **Verdict:** [PASS / CONDITIONAL PASS / FAIL] | **Score:** [X]/100

          ### Findings
          [CRITICAL / HIGH findings first, then MEDIUM, then LOW]
          Each finding: severity, file:line, description, suggested fix

          ### Auto-remediation suggestions
          [Specific code fixes Claude recommends]

          ### Summary
          [2-3 sentence summary of overall quality]

          <!-- claude-code-review -->
          " > claude-review-output.md 2>&1

      - name: Find existing Claude comment
        id: find-comment
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574febe99e0170f # v3.1.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- claude-code-review -->'

      - name: Post or update PR comment
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4.0.0
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: claude-review-output.md
          edit-mode: replace
